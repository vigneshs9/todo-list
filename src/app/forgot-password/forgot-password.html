<div class="min-h-screen flex items-center justify-center bg-gray-100">
 <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">
  <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
   Forgot Password
  </h2>
  <div class="mt-4">
   <app-text-field label="Email" type="email" placeholder="Enter your email" [(value)]="postParams.email">
   </app-text-field>
  </div>

  <div class="mt-4">
   <app-text-field label="New Password" type="password" placeholder="Enter your new password"
    [(value)]="postParams.newPassword">
   </app-text-field>
  </div>

  @if (messageService.message().status) {
  <p [class]="messageService.message().isError ? 'text-sm text-red-600 mt-2' : 'text-sm text-green-600 mt-2'">
   {{ messageService.message().text }}
  </p>
  }

  <div class="mt-6 flex justify-center">
   <app-button label="Save" variant="primary" (clicked)="forgotPassword()">
   </app-button>
  </div>
 </div>
</div>
